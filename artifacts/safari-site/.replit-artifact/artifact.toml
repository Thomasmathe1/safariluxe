kind = "web"
previewPath = "/"
title = "Luxury African Safari"
version = "1.0.0"
id = "artifacts/safari-site"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 23745

[services.development]
run = "pnpm --filter @workspace/safari-site run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/safari-site", "run", "build" ]
publicDir = "artifacts/safari-site/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "23745"
BASE_PATH = "/"
